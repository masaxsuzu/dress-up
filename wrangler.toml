#:schema node_modules/wrangler/config-schema.json
name = "dress-up"
main = ".open-next/worker.js"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[observability]
enabled = true

# Run `wrangler d1 create dress-up` and replace database_id below.
[[d1_databases]]
binding = "DB"
database_name = "dress-up"
database_id = "c5f3ab2e-fcca-4a7a-926e-05f4afcd2ed6"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "dress-up-images"

# ---------------------------------------------------------------------------
# PR プレビュー環境 (本番から完全分離)
#
# 別 Worker (dress-up-preview) + 別 D1 (dress-up-preview) + 別 R2
# (dress-up-images-preview) を使うので、PR で何をしても本番データには触れない。
# 全 PR で同じ preview リソースを共有 (同時 PR でデータが混ざる可能性あり、
# 個人開発スケールでは許容)。
#
# 初期セットアップ手順は docs/preview-deployments.md を参照。
# ---------------------------------------------------------------------------
[env.preview]
name = "dress-up-preview"

[env.preview.assets]
directory = ".open-next/assets"
binding = "ASSETS"

[env.preview.observability]
enabled = true

[[env.preview.d1_databases]]
binding = "DB"
database_name = "dress-up-preview"
database_id = "REPLACE_ME_PREVIEW_DB_ID"
migrations_dir = "migrations"

[[env.preview.r2_buckets]]
binding = "IMAGES"
bucket_name = "dress-up-images-preview"
