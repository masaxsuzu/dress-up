#:schema node_modules/wrangler/config-schema.json
name = "dress-up"
main = ".open-next/worker.js"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[observability]
enabled = true

# Run `wrangler d1 create dress-up` and replace database_id below.
[[d1_databases]]
binding = "DB"
database_name = "dress-up"
database_id = "c5f3ab2e-fcca-4a7a-926e-05f4afcd2ed6"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "dress-up-images"

# ---------------------------------------------------------------------------
# PR プレビュー環境 (Worker は本番と同一、binding と URL だけ変える)
#
# 10 個の env (pr-0 〜 pr-9) を用意して、PR 番号の下 1 桁でスロットを割り当てる。
# 同じ digit の PR が交代する時 (例: #1 → #11) は workflow が D1/R2 を reset。
# 同時並行 11 PR 以上は想定しない (個人用)。
#
# 初期セットアップ:
#   scripts/setup-pr-previews.sh を 1 回実行 → 出力された 10 個の D1 ID を
#   下の REPLACE_ME_PR_N に貼り付けて push。
# 詳細は docs/preview-deployments.md。
# ---------------------------------------------------------------------------

[env.pr-0]
name = "dress-up"
preview_urls = true
[env.pr-0.assets]
directory = ".open-next/assets"
binding = "ASSETS"
[env.pr-0.observability]
enabled = true
[[env.pr-0.d1_databases]]
binding = "DB"
database_name = "dress-up-pr-0"
database_id = "REPLACE_ME_PR_0"
migrations_dir = "migrations"
[[env.pr-0.r2_buckets]]
binding = "IMAGES"
bucket_name = "dress-up-images-pr-0"

