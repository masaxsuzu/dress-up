name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx opennextjs-cloudflare build

      - run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Skip the OpenNext-wrapped deploy command. We already ran
          # `opennextjs-cloudflare build` above; the [ai] binding makes the
          # OpenNext wrapper open a remote proxy session against the existing
          # Worker URL (which is gated by Cloudflare Access in this app), and
          # that auth check fails in CI.
          OPEN_NEXT_DEPLOY: "true"

      - run: npx wrangler d1 migrations apply dress-up --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set Anthropic API key secret
        run: echo "${{ secrets.ANTHROPIC_API_KEY }}" | npx wrangler secret put ANTHROPIC_API_KEY
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set Photoroom API key secret (optional; skipped when unset)
        env:
          PHOTOROOM_API_KEY: ${{ secrets.PHOTOROOM_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$PHOTOROOM_API_KEY" ]; then
            echo "$PHOTOROOM_API_KEY" | npx wrangler secret put PHOTOROOM_API_KEY
          else
            echo "PHOTOROOM_API_KEY not set; skipping"
          fi
