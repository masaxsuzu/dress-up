name: Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

# 同じ PR で連続 push しても古いジョブをキャンセルして無駄を減らす
concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx opennextjs-cloudflare build

      # preview D1 にマイグレーションを当てる。idempotent なので毎 PR で OK。
      - name: Apply migrations to preview D1
        run: npx wrangler d1 migrations apply dress-up-preview --remote --env preview

      # Worker の dress-up-preview に新バージョンをアップロードして preview URL を取得。
      # versions upload は本番トラフィックを切り替えない (deploy と違って promote しない)。
      - name: Upload preview version
        id: upload
        run: |
          set -o pipefail
          out=$(npx wrangler@latest versions upload \
            --env preview \
            --tag "pr-${{ github.event.pull_request.number }}" \
            --message "PR #${{ github.event.pull_request.number }} (${GITHUB_SHA::7})" \
            2>&1 | tee /dev/stderr)
          # wrangler 4.100+ は `Version Preview URL: https://...` 行を出す。
          # その行を最優先で拾い、無ければ任意の workers.dev URL にフォールバック。
          url=$(echo "$out" | grep -oE 'Version Preview URL: https://[^[:space:]]+' | head -n1 | sed 's/^Version Preview URL: //')
          if [ -z "$url" ]; then
            url=$(echo "$out" | grep -oE 'https://[a-zA-Z0-9-]+\.workers\.dev' | head -n1)
          fi
          version_id=$(echo "$out" | grep -oE 'Worker Version ID: [a-f0-9-]+' | head -n1 | sed 's/^Worker Version ID: //')
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "version_id=$version_id" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview
          message: |
            🚀 **Preview deployed**

            ${{ steps.upload.outputs.url && format('URL: {0}', steps.upload.outputs.url) || format('Version ID: `{0}` (URL は Cloudflare ダッシュボードから確認)', steps.upload.outputs.version_id) }}

            | | |
            |---|---|
            | Worker | `dress-up-preview` |
            | D1 | `dress-up-preview` (shared) |
            | R2 | `dress-up-images-preview` (shared) |
            | Commit | `${{ github.event.pull_request.head.sha }}` |

            ⚠️ プレビューは Cloudflare Access の保護外 (public URL)。
