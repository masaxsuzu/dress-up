name: Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

# 同じ PR で連続 push しても古いジョブをキャンセルして無駄を減らす。
# 異なる PR でも同じスロット (digit) は直列化したいが、GitHub 式言語に算術が
# 無く下 1 桁が取れないため、ここでは PR 単位の concurrency で妥協する。
# (同時並行 11 PR 以上は想定しないという前提)
concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx opennextjs-cloudflare build

      # PR 番号の下 1 桁をスロット ID にする (0〜9)。
      - name: Compute preview slot
        id: slot
        run: |
          PR=${{ github.event.pull_request.number }}
          DIGIT=$((PR % 10))
          echo "digit=${DIGIT}" >> "$GITHUB_OUTPUT"
          echo "env_name=pr-${DIGIT}" >> "$GITHUB_OUTPUT"
          echo "Slot for PR #${PR}: pr-${DIGIT}"

      # スロットが別の PR に使われていたら D1/R2 を reset。同じ PR が連続 push
      # した場合は reset しない (デバッグ中のデータを失わないため)。
      # 「直近 version の tag が pr-<同じ PR 番号>」かどうかで判定。
      - name: Reset slot if owner changed
        id: reset
        env:
          DIGIT: ${{ steps.slot.outputs.digit }}
          ENV_NAME: ${{ steps.slot.outputs.env_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          EXPECTED_TAG="pr-${PR_NUMBER}"
          LAST_TAG=$(npx wrangler versions list --env "${ENV_NAME}" --json 2>/dev/null \
            | jq -r '.[0].annotations["workers/tag"] // ""' \
            || echo "")
          echo "Last tag on slot ${ENV_NAME}: '${LAST_TAG}'  Expected: '${EXPECTED_TAG}'"

          if [ -n "${LAST_TAG}" ] && [ "${LAST_TAG}" = "${EXPECTED_TAG}" ]; then
            echo "Same PR redeploys the slot — keep D1/R2 contents."
            echo "did_reset=false" >> "$GITHUB_OUTPUT"
          else
            echo "Slot changed hands — resetting D1 + R2."
            # D1 reset (テーブル一覧は test/helpers/d1.ts TABLES と揃える)
            npx wrangler d1 execute "dress-up-pr-${DIGIT}" \
              --remote --env "${ENV_NAME}" \
              --command "DELETE FROM clothing_items; DELETE FROM profile; DELETE FROM latest_recommendation;"
            # R2 reset: 全 object を消す
            keys=$(npx wrangler r2 object list "dress-up-images-pr-${DIGIT}" --remote --json 2>/dev/null \
              | jq -r '.[].key // empty' || true)
            if [ -n "${keys}" ]; then
              echo "${keys}" | while IFS= read -r key; do
                [ -n "${key}" ] && npx wrangler r2 object delete "dress-up-images-pr-${DIGIT}/${key}" --remote || true
              done
            fi
            echo "did_reset=true" >> "$GITHUB_OUTPUT"
          fi

      # マイグレーションは idempotent なので毎回適用 (reset の有無に関わらず)
      - name: Apply migrations
        env:
          DIGIT: ${{ steps.slot.outputs.digit }}
          ENV_NAME: ${{ steps.slot.outputs.env_name }}
        run: npx wrangler d1 migrations apply "dress-up-pr-${DIGIT}" --remote --env "${ENV_NAME}"

      # Worker `dress-up` に新バージョンを upload。`--env pr-N` により [env.pr-N]
      # の binding (dress-up-pr-N D1 / dress-up-images-pr-N R2) が付く。
      - name: Upload preview version
        id: upload
        env:
          ENV_NAME: ${{ steps.slot.outputs.env_name }}
        run: |
          set -o pipefail
          out=$(npx wrangler@latest versions upload \
            --env "${ENV_NAME}" \
            --tag "pr-${{ github.event.pull_request.number }}" \
            --message "PR #${{ github.event.pull_request.number }} (${GITHUB_SHA::7})" \
            2>&1 | tee /dev/stderr)
          url=$(echo "$out" | grep -oE 'Version Preview URL: https://[^[:space:]]+' | head -n1 | sed 's/^Version Preview URL: //' || true)
          if [ -z "$url" ]; then
            url=$(echo "$out" | grep -oE 'https://[a-zA-Z0-9-]+\.workers\.dev' | head -n1 || true)
          fi
          version_id=$(echo "$out" | grep -oE 'Worker Version ID: [a-f0-9-]+' | head -n1 | sed 's/^Worker Version ID: //' || true)
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "version_id=$version_id" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview
          message: |
            🚀 **Preview deployed**

            ${{ steps.upload.outputs.url && format('URL: {0}', steps.upload.outputs.url) || format('Version ID: `{0}` (URL は Cloudflare ダッシュボードから確認)', steps.upload.outputs.version_id) }}

            | | |
            |---|---|
            | Worker | `dress-up` (preview バージョン) |
            | Slot | `pr-${{ steps.slot.outputs.digit }}` (PR # の下 1 桁) |
            | D1 | `dress-up-pr-${{ steps.slot.outputs.digit }}` |
            | R2 | `dress-up-images-pr-${{ steps.slot.outputs.digit }}` |
            | Slot reset | ${{ steps.reset.outputs.did_reset == 'true' && '🔄 別 PR から交代 — D1/R2 を空にしました' || '✋ 同じ PR の再 push — D1/R2 維持' }} |
            | Commit | `${{ github.event.pull_request.head.sha }}` |

            ⚠️ プレビューは Cloudflare Access の保護外 (public URL)。
