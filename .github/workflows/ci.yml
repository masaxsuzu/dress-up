name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Unit tests with coverage (vitest)
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

      - name: Compute coverage percentage
        if: github.ref == 'refs/heads/main'
        id: coverage
        run: |
          PCT=$(node -e "const s=require('./coverage/coverage-summary.json');console.log(Math.floor(s.total.lines.pct))")
          COLOR=$(node -e "const p=$PCT;console.log(p>=90?'brightgreen':p>=80?'green':p>=70?'yellow':'red')")
          echo "pct=$PCT" >> "$GITHUB_OUTPUT"
          echo "color=$COLOR" >> "$GITHUB_OUTPUT"

      - name: Update coverage badge gist
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: Schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_BADGE_TOKEN }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: dress-up-coverage.json
          label: coverage
          message: ${{ steps.coverage.outputs.pct }}%
          color: ${{ steps.coverage.outputs.color }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests (Playwright)
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  build:
    name: Build (deploy parity)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # deploy.yml と同じビルドコマンドを実行して、Next.js の typecheck・
      # OpenNext バンドルでこける変更を PR の段階で検知する。
      # デプロイはしない。
      - name: OpenNext build
        run: npx opennextjs-cloudflare build
